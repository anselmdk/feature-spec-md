name: Publish Stable to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Stable version bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  publish-stable:
    runs-on: ubuntu-latest
    env:
      BUMP: ${{ inputs.bump }}
      NPM_TAG: latest
      RELEASE_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - run: npm run verify
      - name: Bump stable version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version "${BUMP}" --no-git-tag-version

          published_version="$(node -p "require('./package.json').version")"

          if [[ ! "${published_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Stable releases must produce a bare semver version, like 0.2.0."
            exit 1
          fi

          if git rev-parse "${published_version}" >/dev/null 2>&1; then
            echo "Git tag ${published_version} already exists."
            exit 1
          fi

          git add package.json package-lock.json
          git commit -m "release ${published_version}"
          git tag "${published_version}"

          echo "PUBLISHED_VERSION=${published_version}" >> "${GITHUB_ENV}"
      - name: Push release commit and tag
        run: |
          git push origin "HEAD:${RELEASE_BRANCH}"
          git push origin "${PUBLISHED_VERSION}"
      - name: Publish to npm
        run: npm publish --access public --tag "${NPM_TAG}" --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Report published version
        run: |
          published_name="$(node -p "require('./package.json').name")"

          {
            echo "## Published npm package"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Package | \`${published_name}\` |"
            echo "| Version | \`${PUBLISHED_VERSION}\` |"
            echo "| Dist tag | \`${NPM_TAG}\` |"
            echo "| Git tag | \`${PUBLISHED_VERSION}\` |"
            echo
            echo "Install with:"
            echo
            echo "\`\`\`bash"
            echo "npm install ${published_name}@${PUBLISHED_VERSION}"
            echo "\`\`\`"
          } >> "${GITHUB_STEP_SUMMARY}"
