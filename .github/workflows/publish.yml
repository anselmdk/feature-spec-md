name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Release type"
        required: true
        default: "rc"
        type: choice
        options:
          - rc
          - stable
      version:
        description: "Stable version to publish manually, matching package.json"
        required: false
      rc:
        description: "RC number to publish, e.g. 1 publishes <version>-rc.1"
        required: false
        default: "1"
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_KIND: ${{ github.event_name == 'push' && 'stable' || inputs.release }}
      RELEASE_VERSION: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}
      RC_NUMBER: ${{ github.event_name == 'push' && '' || inputs.rc }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - run: npm run verify
      - name: Prepare npm version
        run: |
          package_version="$(node -p "require('./package.json').version")"

          if [[ ! "${package_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json must contain a stable semver version, like 0.2.0."
            exit 1
          fi

          if [[ "${RELEASE_KIND}" == "rc" ]]; then
            if [[ ! "${RC_NUMBER}" =~ ^[1-9][0-9]*$ ]]; then
              echo "RC releases must use a positive integer RC number, like 1."
              exit 1
            fi

            npm version --no-git-tag-version "${package_version}-rc.${RC_NUMBER}"
            echo "NPM_TAG=rc" >> "${GITHUB_ENV}"
          else
            if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Stable releases must use a bare semver version, like 0.2.0."
              exit 1
            fi

            if [[ "${RELEASE_VERSION}" != "${package_version}" ]]; then
              echo "Release version ${RELEASE_VERSION} does not match package.json version ${package_version}."
              exit 1
            fi

            echo "NPM_TAG=latest" >> "${GITHUB_ENV}"
          fi
      - run: npm publish --access public --tag "${NPM_TAG}" --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Report published version
        run: |
          published_name="$(node -p "require('./package.json').name")"
          published_version="$(node -p "require('./package.json').version")"

          {
            echo "## Published npm package"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Package | \`${published_name}\` |"
            echo "| Version | \`${published_version}\` |"
            echo "| Dist tag | \`${NPM_TAG}\` |"
            echo
            echo "Install with:"
            echo
            echo "\`\`\`bash"
            echo "npm install ${published_name}@${published_version}"
            echo "\`\`\`"
          } >> "${GITHUB_STEP_SUMMARY}"
