name: Reusable feature spec PR diff report

on:
  workflow_call:
    inputs:
      pr-number:
        description: Pull request number. Optional when called from a workflow_run event.
        required: false
        type: string
        default: ""
      ci-workflow-id:
        description: Workflow file name or ID used to find successful PR builds during manual dispatch.
        required: false
        type: string
        default: ci.yml
      node-version:
        description: Node.js version to use.
        required: false
        type: string
        default: "24"
      install-command:
        description: Dependency install command.
        required: false
        type: string
        default: npm install
      relevant-paths-pattern:
        description: JavaScript regular expression string for changed files that should trigger a diff report.
        required: false
        type: string
        default: "^(src|specs|tests|scripts|public)/|^package(-lock)?\\.json$|^vite\\.config\\.|^playwright\\.config\\.|^tsconfig.*\\.json$|\\.(model|feature|stack|design)\\.md$"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diff-report:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_call' ||
      (
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.pull_requests[0]
      )
    runs-on: ubuntu-latest
    steps:
      - name: Check whether code or specs changed
        id: changes
        uses: actions/github-script@v8
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr-number }}
          RELEVANT_PATHS_PATTERN: ${{ inputs.relevant-paths-pattern }}
        with:
          script: |
            const prNumber = process.env.INPUT_PR_NUMBER
              ? Number(process.env.INPUT_PR_NUMBER)
              : context.payload.workflow_run?.pull_requests?.[0]?.number;
            if (!prNumber) {
              core.setFailed('No pull request number was provided and none could be inferred from the workflow_run event.');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const relevantPattern = new RegExp(process.env.RELEVANT_PATHS_PATTERN);
            const relevant = files.some((file) => relevantPattern.test(file.filename));
            core.setOutput('changed', relevant ? 'true' : 'false');
            core.setOutput('pr-number', String(prNumber));
            core.setOutput('head-sha', pr.head.sha);
            core.setOutput('head-ref', pr.head.ref);

      - name: Resolve current PR build
        id: current_build
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v8
        env:
          CI_WORKFLOW_ID: ${{ inputs.ci-workflow-id }}
        with:
          script: |
            if (context.payload.workflow_run) {
              core.setOutput('build-number', String(context.payload.workflow_run.run_number));
              core.setOutput('run-url', context.payload.workflow_run.html_url);
              core.setOutput('workflow-id', String(context.payload.workflow_run.workflow_id));
              return;
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: process.env.CI_WORKFLOW_ID,
              event: 'pull_request',
              status: 'success',
              head_sha: '${{ steps.changes.outputs.head-sha }}',
              per_page: 20,
            });
            const latest = runs[0];
            if (!latest) {
              core.setFailed('No successful pull_request CI build found for PR #${{ steps.changes.outputs.pr-number }} at ${{ steps.changes.outputs.head-sha }}.');
              return;
            }
            core.setOutput('build-number', String(latest.run_number));
            core.setOutput('run-url', latest.html_url);
            core.setOutput('workflow-id', String(latest.workflow_id));

      - name: Find latest main build
        id: main_build
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '${{ steps.current_build.outputs.workflow-id }}',
              branch: 'main',
              status: 'success',
              event: 'push',
              per_page: 20,
            });
            const currentBuildNumber = Number('${{ steps.current_build.outputs.build-number }}');
            const latest = runs.find((run) => run.run_number < currentBuildNumber);
            core.setOutput('build-number', latest ? String(latest.run_number) : '');

      - uses: actions/checkout@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          ref: ${{ steps.changes.outputs.head-sha }}

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: ${{ inputs.install-command }}

      - name: Publish PR diff report
        id: diff_report
        if: steps.changes.outputs.changed == 'true'
        run: npx feature-spec-md github-diff-report --publish ftp
        env:
          FEATURE_SPEC_BUILD_NUMBER: ${{ steps.current_build.outputs.build-number }}
          FEATURE_SPEC_BASE_BUILD_NUMBER: ${{ steps.main_build.outputs.build-number }}
          FEATURE_SPEC_PR_NUMBER: ${{ steps.changes.outputs.pr-number }}
          FEATURE_SPEC_FTP_HOST: ${{ vars.FEATURE_SPEC_FTP_HOST }}
          FEATURE_SPEC_FTP_USER: ${{ vars.FEATURE_SPEC_FTP_USER }}
          FEATURE_SPEC_FTP_REMOTE_DIR: ${{ vars.FEATURE_SPEC_FTP_REMOTE_DIR }}
          FEATURE_SPEC_REPORT_BASE_URL: ${{ vars.FEATURE_SPEC_REPORT_BASE_URL }}
          FEATURE_SPEC_FTP_PASSWORD: ${{ secrets.FEATURE_SPEC_FTP_PASSWORD }}

      - name: Comment on PR
        if: steps.changes.outputs.changed == 'true' && steps.diff_report.outputs.diff-report-url != ''
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = Number('${{ steps.changes.outputs.pr-number }}');
            const body = ${{ toJson(steps.diff_report.outputs.diff-comment-body) }};
            const marker = '<!-- feature-spec-md-pr-diff -->';
            const buildNumber = '${{ steps.current_build.outputs.build-number }}';
            const baseBuildNumber = '${{ steps.main_build.outputs.build-number }}';
            const timestamp = new Date().toISOString();
            const runUrl = '${{ steps.current_build.outputs.run-url }}';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const previous = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            const lines = [];
            lines.push('### PR build ' + buildNumber + ' - ' + timestamp);
            lines.push('');
            lines.push(baseBuildNumber ? 'Base: main build ' + baseBuildNumber : 'Base: previous build fallback');
            lines.push('CI run: [#' + buildNumber + '](' + runUrl + ')');
            lines.push('');
            lines.push(body);
            const entry = lines.join('\n');
            const nextBody = previous
              ? previous.body + '\n\n---\n\n' + entry
              : marker + '\n## Feature spec PR diff history\n\n' + entry;
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body: nextBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: nextBody,
              });
            }
